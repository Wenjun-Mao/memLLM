services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: memllm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memllm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memllm}
      POSTGRES_DB: ${POSTGRES_BOOTSTRAP_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro

  ollama:
    image: ollama/ollama:latest
    container_name: memllm-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ../ollama:/workspace/ollama
    gpus: all

  letta:
    image: letta/letta:latest
    container_name: memllm-letta
    restart: unless-stopped
    depends_on:
      - postgres
      - ollama
    environment:
      LETTA_PG_URI: postgresql://${POSTGRES_USER:-memllm}:${POSTGRES_PASSWORD:-memllm}@postgres:5432/${LETTA_DB_NAME:-letta}
      OLLAMA_BASE_URL: http://ollama:11434/v1
      SECURE: ${LETTA_SECURE:-false}
      LETTA_SERVER_PASSWORD: ${LETTA_SERVER_PASSWORD:-}
    ports:
      - "${LETTA_PORT:-8283}:8283"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: memllm-api
    restart: unless-stopped
    depends_on:
      - postgres
      - ollama
      - letta
    environment:
      MEMLLM_API_HOST: 0.0.0.0
      MEMLLM_API_PORT: 8000
      MEMLLM_API_SEED_ON_STARTUP: 'true'
      MEMLLM_API_DATABASE_BACKEND: sqlalchemy
      MEMLLM_API_DATABASE_URL: postgresql+psycopg://memllm:memllm@postgres:5432/memllm
      MEMLLM_API_LETTA_MODE: real
      MEMLLM_API_LETTA_BASE_URL: http://letta:8283
      MEMLLM_API_LETTA_MODEL: ollama/${OLLAMA_MODEL_ALIAS:-memllm-qwen3.5-9b-q4km}
      MEMLLM_API_LETTA_EMBEDDING: ollama/${OLLAMA_EMBED_MODEL:-mxbai-embed-large}
      MEMLLM_API_LETTA_USE_DIRECT_MODEL_CONFIG: 'true'
      MEMLLM_API_LETTA_MODEL_NAME: ${OLLAMA_MODEL_ALIAS:-memllm-qwen3.5-9b-q4km}:latest
      MEMLLM_API_LETTA_MODEL_ENDPOINT: http://ollama:11434/v1
      MEMLLM_API_LETTA_MODEL_CONTEXT_WINDOW: '262144'
      MEMLLM_API_LETTA_MODEL_MAX_TOKENS: '1024'
      MEMLLM_API_LETTA_EMBEDDING_NAME: ${OLLAMA_EMBED_MODEL:-mxbai-embed-large}:latest
      MEMLLM_API_LETTA_EMBEDDING_ENDPOINT: http://ollama:11434/v1
      MEMLLM_API_LETTA_EMBEDDING_DIM: '1024'
      MEMLLM_API_MEMORY_EXTRACTOR_KIND: ollama_json
      MEMLLM_API_MEMORY_EXTRACTOR_BASE_URL: http://ollama:11434
      MEMLLM_API_MEMORY_EXTRACTOR_MODEL: ${OLLAMA_MODEL_ALIAS:-memllm-qwen3.5-9b-q4km}
      MEMLLM_API_REPLY_PROVIDER_OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"

  dev_ui:
    build:
      context: ../..
      dockerfile: infra/docker/dev_ui.Dockerfile
    container_name: memllm-dev-ui
    restart: unless-stopped
    depends_on:
      - api
    environment:
      MEMLLM_DEV_UI_API_BASE_URL: http://api:8000
      MEMLLM_DEV_UI_REQUEST_TIMEOUT_SECONDS: '300'
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_PORT: '8501'
      STREAMLIT_SERVER_HEADLESS: 'true'
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: 'false'
    ports:
      - "8501:8501"

volumes:
  postgres_data:
  ollama_data:
