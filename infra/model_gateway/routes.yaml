routes:
  doubao_primary:
    kind: tool_mediated_surface
    policy_route: ollama_primary
    surface_route: doubao_surface
    visible: true

  # Keep local Qwen chat on the gateway for now so we can enforce `think: false`.
  # Native Letta -> Ollama support exists, but this GGUF still leaks reasoning text without shaping.
  ollama_primary:
    kind: openai_chat_proxy
    base_url: ${MEMLLM_OLLAMA_OPENAI_BASE_URL}
    model: ${OLLAMA_MODEL_ALIAS}:latest
    timeout_seconds: 300
    headers: {}
    defaults:
      stream: false
      think: false
      temperature: 0.3
      max_tokens: 1024
    visible: true

  # Use the same shaped local route for sleep-time so memory work sees the same local model behavior.
  ollama_sleep_time:
    kind: openai_chat_proxy
    base_url: ${MEMLLM_OLLAMA_OPENAI_BASE_URL}
    model: ${OLLAMA_MODEL_ALIAS}:latest
    timeout_seconds: 300
    headers: {}
    defaults:
      stream: false
      think: false
      temperature: 0.1
      max_tokens: 1024
    visible: true

  doubao_surface:
    kind: custom_simple_http_surface
    endpoint: ${MEMLLM_DOUBAO_ENDPOINT}
    transport: get
    timeout_seconds: 180
    headers: {}
    extra: {}
    visible: false

  qwen3-embedding:
    kind: ollama_embedding_proxy
    base_url: ${MEMLLM_OLLAMA_OPENAI_BASE_URL}
    model: ${OLLAMA_EMBED_MODEL}
    timeout_seconds: 120
    headers: {}
    visible: true
