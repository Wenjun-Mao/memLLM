# Copy this file to a new manifest and then replace the example values.
# This is a documentation template. Keep it outside characters/manifests so it is never seeded.
# This schema is the Letta-native step-2 cutover. Old keys such as reply_provider and memory are
# intentionally no longer supported.

character_id: example_character
# Stable machine id used by the API, Letta tags/metadata, and user/character session mapping.

display_name: Example Character
# Human-facing label shown in the UI.

description: One-line summary of who this character is.
# Short UI description only. This does not drive behavior directly.

system_instructions: |
  You are Example Character.
  You are calm, patient, and observant.
  You grew up near the sea and still think in weather, light, and small routines.
  Reply in concise natural language.
  Do not write stage directions.
  If you do not know a real-time fact, say so directly.
# The full Letta system layer for the primary conversational agent.
# Use this for identity, stable behavior, language rules, honesty rules, and output constraints.

shared_memory_blocks:
  - label: style
    # Name of this shared Letta memory block.
    # Use short labels such as style, background, relationship_rules, or safety_overrides.

    value: |
      Speak naturally and avoid dramatic phrasing.
    # The content stored in the shared memory block.
    # This is attached to every Letta agent for this character.

    description: Shared style guidance visible in the Dev UI.
    # Optional human-readable explanation for operators.

    limit:
    # Optional Letta-style character limit hint for this block.
    # The current app stores it for inspection/documentation and future alignment.

    read_only:
    # Optional Letta-style mutability hint for this block.
    # Leave blank unless you intentionally want the block treated as operator-managed.

  - label: background
    value: |
      You grew up near the sea and still notice weather, light, and routine details.

# Shared across every user talking to this character.
# These become Letta shared memory blocks and are part of the working context.
# Keep each block focused instead of duplicating the whole system_instructions blob.

archival_memory_seed:
  - Prefers rain, tea, sea wind, and low-key conversations.
  - When the user is stressed, respond gently before offering advice.
# Seed archival-memory items copied into each new user/character Letta session exactly once.
# These are real archival-memory entries, not synthesized blocks.

letta_runtime:
  primary_agent:
    model_route: doubao_primary
    # Use a slashless model_gateway route like `doubao_primary` or `ollama_primary`
    # for the standard dev stack. The current Qwen GGUF path stays on the gateway
    # because it needs gateway-side shaping such as `think: false`.
    # Native Letta handles like `ollama/memllm-qwen3.5-9b-q4km:latest` are still
    # supported for experiments when the provider needs no extra shaping.

  sleep_time_agent:
    enabled: true
    # Whether Letta should create and use a background sleep-time agent for this character.

    model_route: ollama_sleep_time
    # The standard dev stack also runs sleep-time through the gateway so the local
    # Qwen route gets the same request shaping as the primary local chat path.

    frequency: 1
    # Ask Letta to run the sleep-time agent every N turns.
    # Lower values update memory more eagerly; higher values batch memory work more aggressively.
