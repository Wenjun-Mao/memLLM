# Copy this file to a new manifest and then replace the example values.
# This is a documentation template. Keep it outside characters/manifests so it is never seeded.
# This schema is a clean dev-phase break. Old keys such as persona/system_prompt/shared_passages
# are intentionally no longer supported.

character_id: example_character
# Stable machine id used by the API, storage, and user/character session mapping.

display_name: Example Character
# Human-facing label shown in the UI.

description: One-line summary of who this character is.
# Short UI description only. This does not drive behavior directly.

system_instructions: |
  You are Example Character.
  You are calm, patient, and observant.
  You grew up near the sea and still think in weather, light, and small routines.
  Reply in concise natural language.
  Do not write stage directions.
  If you do not know a real-time fact, say so directly.
# The full instruction layer for the final reply provider.
# Use this for identity, stable behavior, language rules, honesty rules, and output constraints.
# In the Dev UI this maps to the "System Instructions" section of the prompt pipeline.

reply_provider:
  kind: ollama_chat
  # Which adapter the app should use for the final user-facing reply.
  # Valid values today: ollama_chat, custom_simple_http.

  base_url: http://localhost:11434
  # Base URL for providers that need a local/server endpoint, such as Ollama.
  # Usually omitted for custom_simple_http if endpoint is already fully qualified.

  endpoint:
  # Full endpoint for custom_simple_http providers.
  # Leave null/blank for ollama_chat.

  model: memllm-qwen3.5-9b-q4km
  # Model name used by the provider, if that provider requires one.
  # Required for ollama_chat.

  transport: get
  # HTTP method for custom_simple_http.
  # Valid values today: get, post.
  # For ollama_chat this is ignored.

  timeout_seconds: 180
  # Per-request timeout for the final reply call.

  headers: {}
  # Optional HTTP headers sent to the provider.
  # Put auth or custom provider headers here when needed.

  extra:
    temperature: 0.4
    # Sampling randomness for providers that support it.
    # Lower values are more deterministic; higher values are more varied.

    num_predict: 160
    # Maximum number of output tokens for ollama_chat native generation.
    # Use this to cap reply length.

    # api_mode: native_generate
    # Optional ollama_chat mode switch.
    # native_generate uses /api/generate; chat_completions uses /v1/chat/completions.

# Reply-provider config.
# For custom_simple_http, endpoint is required.
# For ollama_chat, base_url and model are the important fields.
# extra is forwarded to the provider adapter, so supported keys depend on that provider.

memory:
  archival_memory_search_limit: 6
  # How many Letta archival-memory items are retrieved for a live turn and included in the final call.

  snapshot_archival_memory_limit: 12
  # How many archival-memory items the dev UI memory snapshot returns for inspection.

  conversation_history_window: 8
  # How many recent turns are included in the final reply call.

  initial_user_memory: |
    The user has not shared stable preferences yet.
  # The starting Letta `human` block for a new (user_id, character_id) pair.

shared_memory_blocks:
  - label: style
    # Name of this shared Letta memory block.
    # Use short labels such as style, background, relationship_rules, or safety_overrides.

    value: |
      Speak naturally and avoid dramatic phrasing.
    # The content stored in the shared memory block.
    # This is attached to every Letta agent for this character.

    description: Shared style guidance visible in the Dev UI.
    # Optional human-readable explanation for operators.

    limit:
    # Optional future-facing block limit. The current app stores it for inspection/documentation.

    read_only:
    # Optional future-facing mutability hint. The current app stores it for inspection/documentation.

  - label: background
    value: |
      You grew up near the sea and still notice weather, light, and routine details.

# Shared across every user talking to this character.
# These become Letta shared memory blocks and are part of the working context.
# Keep each block focused instead of duplicating the whole system_instructions blob.

archival_memory_seed:
  - Prefers rain, tea, sea wind, and low-key conversations.
  - When the user is stressed, respond gently before offering advice.
# Seed archival-memory items copied into each new Letta agent exactly once.
# These are real archival-memory entries, not synthesized blocks.
# They are distinct from shared_memory_blocks: blocks are shared across users; archival seed text is copied per user-agent pair.
