[project]
name = "memllm-letta-integration"
version = "0.1.0"
description = "Letta integration layer for memLLM"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "letta-client>=0.1.173",
    "loguru>=0.7.3",
    "memllm-domain",
]

[tool.uv.sources]
memllm-domain = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
