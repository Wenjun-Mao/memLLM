[project]
name = "memllm-reply-providers"
version = "0.1.0"
description = "Reply provider abstractions and adapters for memLLM"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
    "loguru>=0.7.3",
    "memllm-domain",
]

[tool.uv.sources]
memllm-domain = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
